<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
    .nav { display: flex; background: #111; padding: 10px; gap: 20px; position: sticky; top: 0; }
    .nav button { background: none; border: none; color: #ccc; cursor: pointer; padding: 10px; font-size: 16px; }
    .nav button.active { color: white; border-bottom: 2px solid white; }
    .tab-content { display: none; padding: 20px; background: white; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <div class="nav">
    <button class="tab-link active" onclick="openTab(event, 'trend')">Trend Report</button>
    <button class="tab-link" onclick="openTab(event, 'competitor')">Competitor Report</button>
    <button class="tab-link" onclick="openTab(event, 'strategy')">Content Strategy</button>
    <button class="tab-link" onclick="openTab(event, 'dashboard')">Dashboard</button>
  </div>

  <div id="trend" class="tab-content active"></div>
  <div id="competitor" class="tab-content"></div>
  <div id="strategy" class="tab-content"></div>
  <div id="dashboard" class="tab-content"></div>

  <script>
    function openTab(evt, tabName) {
      var i, tabcontent, tablinks;
      tabcontent = document.getElementsByClassName("tab-content");
      for (i = 0; i < tabcontent.length; i++) { tabcontent[i].classList.remove("active"); }
      tablinks = document.getElementsByClassName("tab-link");
      for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
      document.getElementById(tabName).classList.add("active");
      evt.currentTarget.classList.add("active");
    }
  </script>
</body>
</html>
